stages:

  data_ingestion:
    cmd: python -m src.data.ingest_data
    deps:
      - src/data/ingest_data.py
      - data/raw/train.csv
      - data/raw/test.csv
    outs:
      - data/processed

  data_validation:
    cmd: python -m src.data.validate
    deps:
      - src/data/validate.py
      - data/processed/train_processed.csv
    outs:
      - data/validation_reports

  feature_engineering:
    cmd: python -m src.features.feature_engineering
    deps:
      - src/features/feature_engineering.py
      - data/processed/train_processed.csv
    outs:
      - data/features/X_train.csv
      - data/features/X_valid.csv
      - data/features/y_train.csv
      - data/features/y_valid.csv
      - models/feature_pipeline.pkl

  model_training:
    cmd: python -m src.models.train
    deps:
      - src/models/train.py
      - params.yaml
      - data/features/X_train.csv
      - data/features/X_valid.csv
      - data/features/y_train.csv
      - data/features/y_valid.csv
    outs:
      - models/LinearRegression.pkl
      - models/RandomForest.pkl
      - models/XGBoost.pkl
      - models/best_model.pkl
      - reports/model_metrics.json
      - artifacts/run_id.txt

  model_evaluation:
    cmd: python -m src.models.evaluate
    deps:
      - src/models/evaluate.py
      - artifacts/run_id.txt
      - models/best_model.pkl
      - data/features/X_valid.csv
      - data/features/y_valid.csv
    outs:
      - reports/evaluation_report.json
      - reports/residual_plot.png
      - reports/error_distribution.png

  model_explainability:
    cmd: python -m src.explainability.shap_explainer
    deps:
      - src/explainability/shap_explainer.py
      - artifacts/run_id.txt
      - models/best_model.pkl
      - data/features/X_valid.csv
    outs:
      - reports/shap_summary_plot.png
      - reports/shap_feature_importance.png