stages:

  data_ingestion:

    cmd: python src/data/ingest_data.py

    deps:
      - src/data/ingest_data.py
      - data/raw/train.csv
      - data/raw/test.csv

    outs:
      - data/processed
  
  data_validation:
    cmd: python src/data/validate.py
    deps:
      - src/data/validate.py
      - data/processed/train_processed.csv
    outs:
      - data/validation_reports
  
  feature_engineering:
    cmd: python src/features/feature_engineering.py
    deps:
      - src/features/feature_engineering.py
      - data/processed/train_processed.csv
    outs:
      - data/features/X_train.csv
      - data/features/X_valid.csv
      - data/features/y_train.csv
      - data/features/y_valid.csv
      - models/feature_pipeline.pkl
  
  model_training:
    cmd: python src/models/train.py
    deps:
      - src/models/train.py
      - data/features/X_train.csv
      - data/features/X_valid.csv
      - data/features/y_train.csv
      - data/features/y_valid.csv
    outs:
      - models/model.pkl
      - reports/model_metrics.json
